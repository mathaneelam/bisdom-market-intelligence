services:
  - type: web
    name: bisdom-intelligence-api
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: OLLAMA_API_KEY_FALLBACK
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_PASSWORD
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_CONTENT_BANK_DATABASE_ID
        sync: false
